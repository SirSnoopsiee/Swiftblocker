<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            margin-bottom: 4vh;
        }

        .logo {
            width: clamp(180px, 40vw, 320px);
            height: auto;
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.4));
            border-radius: 28px;
            object-fit: cover;
        }

        .status-pill {
            display: inline-block;
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #38bdf8;
            padding: 8px 24px;
            border-radius: 100px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(24px, 6vw, 42px);
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
        }

        .description-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            font-size: clamp(14px, 3vw, 16px);
            padding: 14px 32px;
            border-radius: 50px;
            line-height: 1.5;
            max-width: 520px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .url-target {
            color: #38bdf8;
            font-weight: 700;
            word-break: break-all;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        .pill-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            padding: 16px 28px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            outline: none;
        }

        #btn-back {
            display: none;
            background-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        #btn-back:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        #btn-info {
            display: none; /* Hidden by default */
            background: rgba(255, 255, 255, 0.04);
            color: #64748b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        #btn-info:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
        }

        #more-info {
            display: none;
            width: 100%;
            max-width: 450px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 30px;
            margin-top: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }

        .info-row:last-child { border: none; }
        .label { color: #475569; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #38bdf8; font-family: monospace; word-break: break-all; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="https://raw.githubusercontent.com/SirSnoopsiee/Swiftblocker/refs/heads/main/SwiftBlockerAssets/swiftlogo(notext).png" alt="Logo" class="logo" id="logo-img">
        </div>

        <div class="status-pill">
            <h1>Restricted</h1>
        </div>

        <p class="description-pill">
            Access to <span id="display-target" class="url-target">this content</span> is restricted. Check with your administrator for more information.
        </p>

        <div class="btn-stack">
            <button id="btn-back" class="pill-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>

            <button id="btn-info" class="pill-btn" onclick="toggleInfo()">
                <i class="fas fa-circle-info"></i> More Info
            </button>
        </div>

        <div id="more-info">
            <div class="info-row">
                <span class="label">Type:</span>
                <span id="info-type" class="value">N/A</span>
            </div>
            <div class="info-row">
                <span class="label">Data:</span>
                <span id="info-detail" class="value">N/A</span>
            </div>
        </div>
    </div>

    <script>
        // Use textContent everywhere to block XSS exploits
        function safeSet(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
        }

        function toggleInfo() {
            const info = document.getElementById('more-info');
            info.style.display = (info.style.display === 'block') ? 'none' : 'block';
        }

        window.onload = function() {
            if (window.history.length > 1) {
                document.getElementById('btn-back').style.display = 'inline-flex';
            }

            const params = new URLSearchParams(window.location.search);
            const rawUrl = params.get('url');
            const rawKeyword = params.get('keyword');

            // Only show the info button if we actually have data to show
            if (rawUrl || rawKeyword) {
                document.getElementById('btn-info').style.display = 'inline-flex';
                
                if (rawKeyword) {
                    safeSet('display-target', `sites containing "${rawKeyword}"`);
                    safeSet('info-type', "Keyword Filter");
                    safeSet('info-detail', rawKeyword);
                } else {
                    const cleanUrl = rawUrl.replace(/^https?:\/\//, '').trim();
                    safeSet('display-target', cleanUrl);
                    safeSet('info-type', "Domain Block");
                    safeSet('info-detail', rawUrl);
                }
            } else {
                safeSet('display-target', "the requested page");
            }
        };

        document.getElementById('logo-img').onerror = function() {
            this.style.display = 'none';
        };
    </script>
</body>
</html>
