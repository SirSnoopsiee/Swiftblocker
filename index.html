<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftBlocker - Restricted Content</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --accent-blue: #00d2ff;
            --glass: rgba(15, 20, 35, 0.5);
            --glass-dark: rgba(0, 0, 0, 0.3);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --muted: #cbd5e1;
            --bg-fallback: url('https://raw.githubusercontent.com/code-andrewy/jumpman64beta/refs/heads/main/charlie-brown-snoopy-stargazing-desktop-wallpaper-preview.jpg');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
            background-color: #05070a;
            padding: 20px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), var(--bg-fallback);
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease-out;

            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-wrapper {
            margin-bottom: 24px;
        }

        .logo {
            width: clamp(160px, 35vw, 300px);
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            border-radius: 24px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 24px;
            color: var(--accent-blue);
        }

        h1 {
            font-size: clamp(22px, 5vw, 36px);
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 16px;
        }

        .description-pill {
            background: var(--glass-dark);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: clamp(14px, 3vw, 16px);
            padding: 20px;
            border-radius: 20px;
            line-height: 1.6;
            max-width: 480px;
            margin-bottom: 35px;
        }

        .url-target {
            color: var(--accent-blue);
            font-weight: 700;
            word-break: break-all;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        .pill-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 280px;
            padding: 14px 24px;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: none;
        }

        #btn-back {
            background: var(--accent-blue);
            color: #000000;
            box-shadow: 0 8px 15px rgba(0, 210, 255, 0.2);
        }

        #btn-back:hover {
            transform: scale(1.05) translateY(-3px);
        }

        #btn-info {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
        }

        #btn-info:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05) translateY(-3px);
        }

        #more-info {
            display: none;
            width: 100%;
            max-width: 420px;
            background: var(--glass-dark);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: left;
            border: 1px solid var(--border);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: scale(0.98) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }

        .info-row:last-child {
            border: none;
        }

        .label {
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value {
            color: var(--accent-blue);
            font-family: monospace;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="https://raw.githubusercontent.com/SirSnoopsiee/Swiftblocker/refs/heads/main/SwiftBlockerAssets/swiftlogo(notext).png" alt="SwiftBlocker" class="logo" id="logo-img">
        </div>

        <div class="status-pill">
            <i class="fas fa-shield-halved"></i> SwiftBlocker
        </div>

        <h1>Content has been blocked</h1>

        <p class="description-pill">
            SwiftBlocker has blocked <span id="display-target" class="url-target">url not found</span>.
        </p>

        <div class="btn-stack">
            <button id="btn-back" class="pill-btn" onclick="handleBack()" style="display: none;">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>

            <button id="btn-info" class="pill-btn" onclick="toggleInfo()" style="display: none;">
                <i class="fas fa-circle-info"></i> More Details
            </button>
        </div>

        <div id="more-info">
            <div class="info-row">
                <span class="label">Filter:</span>
                <span class="value">SwiftBlocker Web Filter</span>
            </div>
            <div class="info-row">
                <span class="label">Policy:</span>
                <span id="info-type" class="value">N/A</span>
            </div>
            <div class="info-row">
                <span class="label">Blocked keyword/website url:</span>
                <span id="info-detail" class="value">N/A</span>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_REDIRECT = "https://github.com/SirSnoopsiee/Swiftblocker";
        // Prevent layout exploits by truncating excessively long queries
        function sanitizeInput(str, maxLength = 150) {
            if (!str) return null;
            return str.length > maxLength ? str.substring(0, maxLength) + "..." : str;
        }

        function safeSet(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
        }

        function toggleInfo() {
            const info = document.getElementById('more-info');
            const isVisible = info.style.display === 'block';
            info.style.display = isVisible ? 'none' : 'block';
        }

        function handleBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.replace(DEFAULT_REDIRECT);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);

            // Apply sanitization to block long-string UI exploits
            const rawUrl = sanitizeInput(params.get('url'), 200);
            const rawKeyword = sanitizeInput(params.get('keyword'), 100);

            if (!rawUrl && !rawKeyword) {
                window.location.replace(DEFAULT_REDIRECT);
                return;
            }

            if (window.history.length > 1) {
                document.getElementById('btn-back').style.display = 'inline-flex';
            }

            if (rawUrl || rawKeyword) {
                document.getElementById('btn-info').style.display = 'inline-flex';

                if (rawKeyword) {
                    safeSet('display-target', `keyword blocked"${rawKeyword}"`);
                    safeSet('info-type', "Keyword Filter");
                    safeSet('info-detail', rawKeyword);
                } else if (rawUrl) {
                    const cleanUrl = rawUrl.replace(/^https?:\/\//i, '').split('/')[0];
                    safeSet('display-target', cleanUrl || "this domain");
                    safeSet('info-type', "Domain");
                    safeSet('info-detail', rawUrl);
                }
            }
        });

        document.getElementById('logo-img').onerror = function() {
            this.style.display = 'none';
        };
    </script>
</body>

</html>
