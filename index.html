<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted | SwiftBlocker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Deep gradient for that modern security look */
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
            /* Prevents scrollbars on small screens */
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            /* Flex-grow allows it to adjust, max-width keeps it readable on desktops */
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Large, Responsive Logo */
        .logo-wrapper {
            margin-bottom: 5vh;
            /* Responsive margin based on viewport height */
        }

        .logo {
            width: clamp(200px, 45vw, 380px);
            /* Auto-adjusting size */
            height: auto;
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.4));
            transition: transform 0.4s ease;
        }

        h1 {
            color: #38bdf8;
            font-size: clamp(36px, 8vw, 64px);
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -2px;
        }

        .description {
            color: #94a3b8;
            font-size: clamp(15px, 3.5vw, 19px);
            margin-bottom: 40px;
            line-height: 1.6;
            max-width: 450px;
        }

        /* Pill Buttons Stack */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        .pill-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            padding: 16px 28px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            outline: none;
        }

        /* Primary Blue Button */
        #btn-back {
            display: none;
            /* Controlled by JavaScript */
            background-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        #btn-back:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        /* Info Button Hidden if no URL */
        #btn-info-container {
            display: none;
            width: 100%;
            justify-content: center;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #64748b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
        }

        /* Info Pill Panel */
        #more-info {
            display: none;
            width: 100%;
            max-width: 450px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            padding: 24px;
            border-radius: 30px;
            margin-top: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: scale(0.98) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .label {
            color: #475569;
            font-weight: 700;
            text-transform: uppercase;
        }

        .value {
            color: #38bdf8;
            font-family: monospace;
            word-break: break-all;
        }

        .footer {
            margin-top: 50px;
            font-size: 10px;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo-wrapper">
            <img src="https://raw.githubusercontent.com/SirSnoopsiee/Swiftblocker/refs/heads/main/SwiftBlockerAssets/swiftlogo(notext).png" alt="SwiftBlocker" class="logo" onerror="this.style.display='none'">
        </div>

        <h1>Restricted</h1>
        <p class="description">Access to this page is blocked, Please check with your administrator if you believe this is an error.</p>

        <div class="btn-stack">
            <button id="btn-back" class="pill-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>

            <div id="btn-info-container">
                <button class="pill-btn btn-secondary" onclick="toggleInfo()">
                    <i class="fas fa-circle-info"></i> More Info
                </button>
            </div>
        </div>

        <div id="more-info">
            <div class="info-row">
                <span class="label">Blocked URL:</span>
                <span class="value" id="url-display">N/A</span>
            </div>
            <div class="info-row">
                <span class="label">List</span>
                <span class="value">SwiftBlocker filters</span>
            </div>
        </div>

        <div class="footer">

        </div>
    </div>

    <script>
        function toggleInfo() {
            const info = document.getElementById('more-info');
            const isHidden = window.getComputedStyle(info).display === 'none';
            info.style.display = isHidden ? 'block' : 'none';
        }

        window.onload = function() {
            // 1. Hide "Go Back" if there's no history (new tab)
            const backBtn = document.getElementById('btn-back');
            if (window.history.length > 1) {
                backBtn.style.display = 'inline-flex';
            }

            // 2. Hide "More Info" if no URL parameter is found
            try {
                const params = new URLSearchParams(window.location.search);
                const blockedUrl = params.get('url');

                if (blockedUrl && blockedUrl.trim() !== "") {
                    // XSS Protection: use textContent
                    document.getElementById('url-display').textContent = blockedUrl;
                    document.getElementById('btn-info-container').style.display = 'flex';
                }
            } catch (e) {
                console.error("UI Error:", e);
            }
        };
    </script>
</body>

</html>
