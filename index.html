<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted | SwiftBlocker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            margin-bottom: 4vh;
        }

        .logo {
            width: clamp(180px, 40vw, 320px);
            height: auto;
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.4));
            /* Rounded corners fix */
            border-radius: 28px;
            object-fit: cover;
        }

        .status-pill {
            display: inline-block;
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #38bdf8;
            padding: 8px 24px;
            border-radius: 100px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(24px, 6vw, 42px);
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
        }

        .description-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            font-size: clamp(14px, 3vw, 16px);
            padding: 14px 32px;
            border-radius: 50px;
            line-height: 1.5;
            max-width: 520px;
            margin-bottom: 40px;
        }

        .url-target {
            color: #38bdf8;
            font-weight: 700;
            /* Prevents long URLs from breaking the pill layout */
            word-break: break-all;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        .pill-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            padding: 16px 28px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            outline: none;
        }

        #btn-back {
            display: none;
            background-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        #btn-back:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        #btn-info-container {
            display: none;
            width: 100%;
            justify-content: center;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #64748b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
        }

        #more-info {
            display: none;
            width: 100%;
            max-width: 450px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            padding: 24px;
            border-radius: 30px;
            margin-top: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .label { color: #475569; font-weight: 700; text-transform: uppercase; }
        .value { color: #38bdf8; font-family: monospace; word-break: break-all; }
        .footer { margin-top: 50px; font-size: 10px; color: #334155; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="https://raw.githubusercontent.com/SirSnoopsiee/Swiftblocker/refs/heads/main/SwiftBlockerAssets/swiftlogo(notext).png" alt="SwiftBlocker" class="logo" onerror="this.style.display='none'">
        </div>

        <div class="status-pill">
            <h1>Restricted</h1>
        </div>

        <p class="description-pill">
            Access to <span id="display-url" class="url-target">this site</span> is blocked. Please check with your administrator if you believe this is an error.
        </p>

        <div class="btn-stack">
            <button id="btn-back" class="pill-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>

            <div id="btn-info-container">
                <button class="pill-btn btn-secondary" onclick="toggleInfo()">
                    <i class="fas fa-circle-info"></i> More Info
                </button>
            </div>
        </div>

        <div id="more-info">
            <div class="info-row">
                <span class="label">Blocked URL:</span>
                <span class="value" id="url-details">N/A</span>
            </div>
            <div class="info-row">
                <span class="label">List</span>
                <span class="value">SwiftBlocker filters</span>
            </div>
        </div>

        <div class="footer"></div>
    </div>

    <script>
        function toggleInfo() {
            const info = document.getElementById('more-info');
            const isHidden = window.getComputedStyle(info).display === 'none';
            info.style.display = isHidden ? 'block' : 'none';
        }

        function sanitize(text) {
            const element = document.createElement('div');
            element.textContent = text;
            return element.innerHTML;
        }

        window.onload = function() {
            
            const backBtn = document.getElementById('btn-back');
            if (window.history.length > 1) {
                backBtn.style.display = 'inline-flex';
            }

            
            try {
                const params = new URLSearchParams(window.location.search);
                const rawUrl = params.get('url');

                if (rawUrl && rawUrl.trim() !== "") {
                    
                    const cleanUrl = rawUrl.replace(/^https?:\/\//, ''); 
                    
                    document.getElementById('display-url').textContent = cleanUrl;
                    document.getElementById('url-details').textContent = rawUrl;
                    
                    
                    document.getElementById('btn-info-container').style.display = 'flex';
                }
            } catch (err) {
                console.error("UI Logic Error:", err);
                document.getElementById('display-url').textContent = "the requested page";
            }
        };
    </script>
</body>

</html>
