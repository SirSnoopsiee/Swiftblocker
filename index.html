<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Content</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg-dark) 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            margin-bottom: 4vh;
        }

        .logo {
            width: clamp(160px, 35vw, 300px);
            height: auto;
            filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.3));
            border-radius: 24px;
        }

        .status-pill {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 10px 28px;
            border-radius: 100px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(22px, 5vw, 36px);
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--primary);
        }

        .description-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            font-size: clamp(14px, 3vw, 16px);
            padding: 18px 30px;
            border-radius: 24px;
            line-height: 1.6;
            max-width: 480px;
            margin-bottom: 35px;
            backdrop-filter: blur(12px);
        }

        .url-target {
            color: var(--primary);
            font-weight: 600;
            word-break: break-all;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            align-items: center;
        }

        .pill-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 280px;
            padding: 14px 24px;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        #btn-back {
            background-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2);
        }

        #btn-back:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        #btn-info {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #btn-info:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        #more-info {
            display: none;
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 8px;
        }

        .info-row:last-child { border: none; }
        .label { color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .value { color: var(--primary); font-family: 'JetBrains Mono', monospace; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="https://raw.githubusercontent.com/SirSnoopsiee/Swiftblocker/refs/heads/main/SwiftBlockerAssets/swiftlogo(notext).png" alt="SwiftBlocker" class="logo" id="logo-img">
        </div>

        <div class="status-pill">
            <h1>Restricted</h1>
        </div>

        <p class="description-pill">
            Access to <span id="display-target" class="url-target">this content</span> has been blocked. Contact your system administrator for details.
        </p>

        <div class="btn-stack">
            <button id="btn-back" class="pill-btn" onclick="handleBack()" style="display: none;">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>

            <button id="btn-info" class="pill-btn" onclick="toggleInfo()" style="display: none;">
                <i class="fas fa-circle-info"></i> Connection Details
            </button>
        </div>

        <div id="more-info">
            <div class="info-row">
                <span class="label">Policy:</span>
                <span id="info-type" class="value">N/A</span>
            </div>
            <div class="info-row">
                <span class="label">Identifier:</span>
                <span id="info-detail" class="value">N/A</span>
            </div>
        </div>
    </div>

    <script>

        const DEFAULT_REDIRECT = "https://github.com/SirSnoopsiee/Swiftblocker";

        function safeSet(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
        }

        function toggleInfo() {
            const info = document.getElementById('more-info');
            const isVisible = info.style.display === 'block';
            info.style.display = isVisible ? 'none' : 'block';
        }

        function handleBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.replace(DEFAULT_REDIRECT);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const rawUrl = params.get('url');
            const rawKeyword = params.get('keyword');

           
            if (!rawUrl && !rawKeyword) {
                window.location.replace(DEFAULT_REDIRECT);
                return; 
            }

           
            if (window.history.length > 1) {
                document.getElementById('btn-back').style.display = 'inline-flex';
            }

            
            if (rawUrl || rawKeyword) {
                document.getElementById('btn-info').style.display = 'inline-flex';
                
                if (rawKeyword) {
                    safeSet('display-target', `content matching "${rawKeyword}"`);
                    safeSet('info-type', "Keyword Filter");
                    safeSet('info-detail', rawKeyword);
                } else {
                    
                    const cleanUrl = rawUrl.replace(/^https?:\/\//i, '').split('/')[0];
                    safeSet('display-target', cleanUrl || "this domain");
                    safeSet('info-type', "Domain Restriction");
                    safeSet('info-detail', rawUrl);
                }
            }
        });

       
        document.getElementById('logo-img').onerror = function() {
            this.style.display = 'none';
        };
    </script>
</body>
</html>
